<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Результат - Географический вопроситель</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            padding: 20px;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin: 20px auto;
            max-width: 900px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .score-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .score-value {
            font-size: 80px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: scoreReveal 0.8s ease-out;
        }

        @keyframes scoreReveal {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .score-label {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 10px;
        }

        .distance-info {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            border-left: 4px solid #ffd700;
        }

        .distance-value {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
        }

        .perfect-badge {
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            color: #1a1a2e;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            font-weight: bold;
            margin-top: 10px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .map-container {
            width: 100%;
            height: 400px;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .coordinates-compare {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin: 20px 0;
        }

        .coord-box {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .coord-box h4 {
            margin-bottom: 10px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        .coord-box .coord {
            font-family: monospace;
            font-size: 14px;
            color: #ffd700;
        }

        .coord-box.user {
            border-left: 3px solid #28a745;
        }

        .coord-box.correct {
            border-left: 3px solid #ffd700;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-next {
            background: linear-gradient(135deg, #28a745 0%, #1e7e34 100%);
            color: white;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
        }

        .btn-menu {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-menu:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .progress-bar-container {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #28a745 0%, #ffd700 100%);
            height: 100%;
            width: 0%;
            transition: width 1s ease;
            border-radius: 10px;
        }

        .location-name {
            text-align: center;
            font-size: 20px;
            margin-bottom: 20px;
            color: #ffd700;
        }

        @media (max-width: 768px) {
            .coordinates-compare {
                flex-direction: column;
            }

            .score-value {
                font-size: 50px;
            }

            .map-container {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="result-card">
            <div class="score-container">
                <div class="score-value" id="scoreValue">0</div>
                <div class="score-label">ОЧКИ В РАУНДЕ</div>
                <div id="perfectBadge" style="display: none;">
                    <div class="perfect-badge">Как ты так смог? 10000</div>
                </div>
            </div>

            <div class="distance-info">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span>Расстояние до правильного места:</span>
                    <span class="distance-value" id="distanceValue">- км</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
                <div style="font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 10px;">
                    * Чем ближе ваша догадка, тем больше очков
                </div>
            </div>

            <div class="coordinates-compare">
                <div class="coord-box user">
                    <h4>ВАША ДОГАДКА</h4>
                    <div class="coord" id="userCoords">-</div>
                </div>
                <div class="coord-box correct">
                    <h4>ПРАВИЛЬНЫЙ ОТВЕТ</h4>
                    <div class="coord" id="correctCoords">-</div>
                </div>
            </div>

            <div class="map-container">
                <div id="map"></div>
            </div>

            <div class="btn-group">
                <a href="/" class="btn btn-menu">Главное меню</a>
                <button class="btn btn-next" id="nextRoundBtn">Следующий раунд ➜</button>
            </div>
        </div>
    </div>

    <script src="https://api-maps.yandex.ru/2.1/?apikey=722f4f80-99eb-47d8-af1f-0eff526f8546&lang=ru_RU"></script>
    <script>
        // Получаем координаты из URL
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                userLat: parseFloat(params.get('userLat')),
                userLng: parseFloat(params.get('userLng')),
                correctLat: parseFloat(params.get('correctLat')),
                correctLng: parseFloat(params.get('correctLng')),
                roundId: parseInt(params.get('roundId')),
                locationName: params.get('name')
            };
        }

        const params = getUrlParams();
        let userLat = params.userLat;
        let userLng = params.userLng;
        let correctLat = params.correctLat;
        let correctLng = params.correctLng;
        let locationName = params.locationName;

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function calculateScore(distanceKm) {
            if (distanceKm <= 0) return 10000;
            const alpha = 3100;
            let score = 10000 * Math.exp(-distanceKm / alpha);
            score = Math.round(score);
            return Math.min(10000, Math.max(0, score));
        }

        function formatDistance(distanceKm) {
            if (distanceKm < 1) {
                return `${Math.round(distanceKm * 1000)} м`;
            } else if (distanceKm < 100) {
                return `${distanceKm.toFixed(1)} км`;
            } else {
                return `${Math.round(distanceKm)} км`;
            }
        }

        function animateScore(finalScore) {
            const scoreElement = document.getElementById('scoreValue');
            let currentScore = 0;
            const duration = 1000;
            const stepTime = 20;
            const steps = duration / stepTime;
            const increment = finalScore / steps;

            const interval = setInterval(() => {
                currentScore += increment;
                if (currentScore >= finalScore) {
                    currentScore = finalScore;
                    scoreElement.textContent = Math.round(currentScore);
                    clearInterval(interval);
                    if (finalScore === 10000) {
                        document.getElementById('perfectBadge').style.display = 'block';
                    }
                } else {
                    scoreElement.textContent = Math.round(currentScore);
                }
            }, stepTime);
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (isNaN(userLat) || isNaN(userLng)) {
                userLat = 40.7128;
                userLng = -74.0060;
                console.log('Использованы тестовые координаты пользователя');
            }

            if (isNaN(correctLat) || isNaN(correctLng)) {
                correctLat = 55.7558;
                correctLng = 37.6173;
                console.log('Использованы тестовые правильные координаты');
            }

            const distance = calculateDistance(userLat, userLng, correctLat, correctLng);
            const score = calculateScore(distance);

            document.getElementById('distanceValue').textContent = formatDistance(distance);
            document.getElementById('userCoords').textContent = `${userLat.toFixed(6)}, ${userLng.toFixed(6)}`;
            document.getElementById('correctCoords').textContent = `${correctLat.toFixed(6)}, ${correctLng.toFixed(6)}`;

            animateScore(score);

            setTimeout(() => {
                const progressPercent = (score / 10000) * 100;
                document.getElementById('progressBar').style.width = `${progressPercent}%`;
            }, 100);

            ymaps.ready(function() {
                const map = new ymaps.Map('map', {
                    center: [(userLat + correctLat) / 2, (userLng + correctLng) / 2],
                    zoom: 3,
                    controls: ['zoomControl']
                });

                const userPlacemark = new ymaps.Placemark(
                    [userLat, userLng],
                    {
                        balloonContent: '<strong>Ваша догадка</strong>',
                        hintContent: 'Ваша догадка'
                    },
                    {
                        preset: 'islands#greenCircleIcon',
                        iconColor: '#28a745'
                    }
                );

                const correctPlacemark = new ymaps.Placemark(
                    [correctLat, correctLng],
                    {
                        balloonContent: `<strong>Правильное место</strong><br>${locationName || ''}`,
                        hintContent: 'Правильный ответ'
                    },
                    {
                        preset: 'islands#yellowCircleIcon',
                        iconColor: '#ffd700'
                    }
                );

                map.geoObjects.add(userPlacemark);
                map.geoObjects.add(correctPlacemark);

                const line = new ymaps.Polyline(
                    [[userLat, userLng], [correctLat, correctLng]],
                    {},
                    {
                        strokeColor: '#ffd700',
                        strokeWidth: 3,
                        strokeOpacity: 0.7
                    }
                );
                map.geoObjects.add(line);

                const bounds = [
                    [Math.min(userLat, correctLat), Math.min(userLng, correctLng)],
                    [Math.max(userLat, correctLat), Math.max(userLng, correctLng)]
                ];
                map.setBounds(bounds, { checkZoomRange: true, zoomMargin: 50 });
            });
        });

        document.getElementById('nextRoundBtn').addEventListener('click', function() {
            sessionStorage.removeItem('userLat');
            sessionStorage.removeItem('userLng');
            window.location.href = '/game';
        });
    </script>
</body>
</html>

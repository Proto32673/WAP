<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Карта мира - Географический вопроситель</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .map-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .map-controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #28a745 0%, #1e7e34 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .coordinates-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 12px 18px;
            border-radius: 10px;
            color: white;
            font-size: 12px;
            font-family: monospace;
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: none;
        }

        .coordinates-panel span {
            color: #28a745;
            font-weight: bold;
        }

        .marker-info {
            position: absolute;
            bottom: 100px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            border-radius: 10px;
            color: white;
            font-size: 12px;
            border-left: 3px solid #28a745;
            pointer-events: none;
        }

        .zoom-controls {
            position: absolute;
            right: 20px;
            bottom: 100px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .zoom-btn {
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .zoom-btn:hover {
            background: #28a745;
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .map-controls {
                flex-direction: column;
                bottom: 10px;
                left: 10px;
                right: 10px;
                padding: 10px;
            }

            .btn {
                justify-content: center;
            }

            .coordinates-panel {
                top: 10px;
                right: 10px;
                font-size: 10px;
            }

            .marker-info {
                bottom: 120px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="map-container">
        <div id="map"></div>

        <div class="coordinates-panel">
            Координаты: <span id="coordDisplay">0.0000, 0.0000</span>
        </div>

        <div class="marker-info">
            Статус: <span id="markerStatus">Нет метки</span>
        </div>

        <div class="zoom-controls">
            <button class="zoom-btn" id="zoomInBtn">+</button>
            <button class="zoom-btn" id="zoomOutBtn">−</button>
        </div>

        <div class="map-controls">
            <button class="btn btn-primary" id="addMarkerBtn">Добавить метку</button>
            <button class="btn btn-danger" id="clearMarkersBtn">Удалить метку</button>
            <button class="btn btn-secondary" id="centerMapBtn">Центрировать</button>
            <button class="btn btn-primary" id="answBtn">Ответить</button>
        </div>
    </div>

    <script src="https://api-maps.yandex.ru/2.1/?apikey=722f4f80-99eb-47d8-af1f-0eff526f8546&lang=ru_RU"></script>

    <script>
        let map;
        let currentPlacemark = null;
        let addMarkerMode = false;

        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                correctLat: parseFloat(params.get('lat')),
                correctLng: parseFloat(params.get('lng')),
                roundId: parseInt(params.get('round_id')),
                locationName: params.get('name')
            };
        }

        function initGame() {
            const gameParams = getUrlParams();
            sessionStorage.setItem('correctLat', gameParams.correctLat);
            sessionStorage.setItem('correctLng', gameParams.correctLng);
            sessionStorage.setItem('roundId', gameParams.roundId);
            sessionStorage.setItem('locationName', gameParams.locationName || "Неизвестное место");
        }

        function updateMarkerStatus() {
            const statusSpan = document.getElementById('markerStatus');
            if (currentPlacemark) {
                const coords = currentPlacemark.geometry.getCoordinates();
                statusSpan.innerHTML = `Метка установлена<br>(${coords[0].toFixed(6)}, ${coords[1].toFixed(6)})`;
                statusSpan.style.color = '#28a745';
            } else {
                statusSpan.innerHTML = 'Нет метки';
                statusSpan.style.color = '#dc3545';
            }
        }

        function setPlacemark(lat, lng) {
            if (currentPlacemark) {
                map.geoObjects.remove(currentPlacemark);
            }

            currentPlacemark = new ymaps.Placemark(
                [lat, lng],
                {
                    balloonContent: `<div style="text-align:center;"><strong>Текущая метка</strong><br>Широта: ${lat.toFixed(6)}<br>Долгота: ${lng.toFixed(6)}<br><button onclick="removeCurrentPlacemark()" style="margin-top:8px;padding:5px 12px;background:#dc3545;color:white;border:none;border-radius:5px;cursor:pointer;">Удалить</button></div>`,
                    hintContent: `Координаты: ${lat.toFixed(6)}, ${lng.toFixed(6)}`
                },
                { preset: 'islands#greenCircleIcon', iconColor: '#28a745' }
            );

            map.geoObjects.add(currentPlacemark);
            updateMarkerStatus();
        }

        window.removeCurrentPlacemark = function() {
            if (currentPlacemark) {
                map.geoObjects.remove(currentPlacemark);
                currentPlacemark = null;
                updateMarkerStatus();
            }
        };

        function centerMap() {
            if (currentPlacemark) {
                const coords = currentPlacemark.geometry.getCoordinates();
                map.setCenter(coords, 10);
            } else {
                map.setCenter([20, 0], 2);
            }
        }

        function answerQuestion() {
            if (!currentPlacemark) {
                alert('Сначала установите метку на карте!');
                return;
            }

            const coords = currentPlacemark.geometry.getCoordinates();
            const userLat = coords[0];
            const userLng = coords[1];
            const correctLat = sessionStorage.getItem('correctLat');
            const correctLng = sessionStorage.getItem('correctLng');
            const roundId = sessionStorage.getItem('roundId');
            const locationName = sessionStorage.getItem('locationName');

            // Переход на /ans с передачей всех параметров
            window.location.href = `/ans?userLat=${userLat}&userLng=${userLng}&correctLat=${correctLat}&correctLng=${correctLng}&roundId=${roundId}&name=${encodeURIComponent(locationName)}`;
        }

        ymaps.ready(function() {
            initGame();

            map = new ymaps.Map('map', {
                center: [20, 0],
                zoom: 2,
                controls: []
            });

            map.controls.add('zoomControl', { position: { right: 20, top: 100 } });

            const coordDisplay = document.getElementById('coordDisplay');
            map.events.add('mousemove', function(e) {
                const coords = e.get('coords');
                coordDisplay.textContent = `${coords[0].toFixed(6)}, ${coords[1].toFixed(6)}`;
            });

            map.events.add('click', function(e) {
                if (addMarkerMode) {
                    const coords = e.get('coords');
                    setPlacemark(coords[0], coords[1]);
                    addMarkerMode = false;
                    document.getElementById('addMarkerBtn').style.opacity = '1';
                }
            });

            document.getElementById('addMarkerBtn').addEventListener('click', function() {
                addMarkerMode = true;
                this.style.opacity = '0.7';
                setTimeout(() => {
                    if (addMarkerMode) {
                        addMarkerMode = false;
                        this.style.opacity = '1';
                    }
                }, 10000);
            });

            document.getElementById('clearMarkersBtn').addEventListener('click', function() {
                if (currentPlacemark && confirm('Удалить метку?')) {
                    removeCurrentPlacemark();
                }
            });

            document.getElementById('centerMapBtn').addEventListener('click', centerMap);
            document.getElementById('answBtn').addEventListener('click', answerQuestion);

            document.getElementById('zoomInBtn').addEventListener('click', () => map.setZoom(map.getZoom() + 1));
            document.getElementById('zoomOutBtn').addEventListener('click', () => map.setZoom(map.getZoom() - 1));
        });
    </script>
</body>
</html>
